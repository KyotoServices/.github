name: Deploy to Pelican (reusable)

# Deploys a published release's plugin jar to one or more Pelican game servers
# (Paper or Velocity). Runs on the self-hosted runner inside the network. The
# `environment` gate provides the approval step.
on:
  workflow_call:
    inputs:
      environment:
        type: string
        default: dev
      plugin-name:
        description: "Plugin name (matches the jar prefix and the log line)"
        type: string
        required: true
      targets:
        description: 'JSON list of {host,remote_dir,log_path,container_fallback?}'
        type: string
        required: true
      log-pattern:
        description: "Log line to wait for; {plugin} is substituted (Velocity: 'Loaded plugin {plugin}')"
        type: string
        default: "Enabling {plugin}"
      tag:
        description: "Release tag to deploy (defaults to the triggering release's tag)"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, kyoto-deploy]
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve tag
        id: t
        run: |
          T="${{ inputs.tag }}"
          [ -z "$T" ] && T="${{ github.event.release.tag_name }}"
          if [ -z "$T" ]; then echo "::error::No tag to deploy"; exit 1; fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"
          echo "Deploying $T of ${{ github.repository }} to ${{ inputs.environment }}"

      - name: Download release jar
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.t.outputs.tag }}
          PLUGIN: ${{ inputs.plugin-name }}
        run: |
          set -euo pipefail
          rm -rf artifacts && mkdir -p artifacts
          json=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")
          sel='.assets[] | select(.name|startswith($p+"-")) | select(.name|endswith(".jar")) | select(.name|test("sources|javadoc|plain")|not)'
          name=$(echo "$json" | jq -r --arg p "$PLUGIN" "$sel | .name" | head -n1)
          url=$(echo "$json" | jq -r --arg p "$PLUGIN" "$sel | .url" | head -n1)
          if [ -z "$name" ] || [ "$name" = "null" ]; then echo "::error::No jar asset for $PLUGIN in $TAG"; exit 1; fi
          curl -sfL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" "$url" -o "artifacts/$name"
          echo "Downloaded $name ($(stat -c%s "artifacts/$name") bytes)"

      - name: Deploy
        env:
          KYOTO_CREDS_FILE: /opt/kyoto-deploy/creds.md
        run: |
          set -euo pipefail
          python3 /opt/kyoto-deploy/deploy_artifact.py \
            --plugin-name '${{ inputs.plugin-name }}' \
            --log-pattern '${{ inputs.log-pattern }}' \
            --targets '${{ inputs.targets }}' \
            --artifact 'artifacts/*.jar'
