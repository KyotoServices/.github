name: Deploy static site (reusable)

# Deploys a published release's site zip to an nginx web root via the
# self-hosted runner.
on:
  workflow_call:
    inputs:
      environment:
        type: string
        default: dev
      host:
        type: string
        required: true
      web-dir:
        description: "Remote nginx root, e.g. /var/www/stats.kyotopvp.com"
        type: string
        required: true
      domain:
        description: "Optional Host header for a curl smoke test"
        type: string
        default: ""
      tag:
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, kyoto-deploy]
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve tag
        id: t
        run: |
          T="${{ inputs.tag }}"; [ -z "$T" ] && T="${{ github.event.release.tag_name }}"
          if [ -z "$T" ]; then echo "::error::No tag"; exit 1; fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"

      - name: Download release zip
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.t.outputs.tag }}
        run: |
          set -euo pipefail
          rm -rf artifacts && mkdir -p artifacts
          json=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")
          sel='.assets[] | select(.name|endswith(".zip"))'
          name=$(echo "$json" | jq -r "$sel | .name" | head -n1)
          url=$(echo "$json" | jq -r "$sel | .url" | head -n1)
          if [ -z "$name" ] || [ "$name" = "null" ]; then echo "::error::No .zip asset in $TAG"; exit 1; fi
          curl -sfL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" "$url" -o "artifacts/$name"
          echo "Downloaded $name ($(stat -c%s "artifacts/$name") bytes)"

      - name: Deploy
        env:
          KYOTO_CREDS_FILE: /opt/kyoto-deploy/creds.md
        run: |
          set -euo pipefail
          ARGS=(--host '${{ inputs.host }}' --web-dir '${{ inputs.web-dir }}' --artifact 'artifacts/*.zip')
          [ -n '${{ inputs.domain }}' ] && ARGS+=(--domain '${{ inputs.domain }}')
          python3 /opt/kyoto-deploy/deploy_web.py "${ARGS[@]}"
